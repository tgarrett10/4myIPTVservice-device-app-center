<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#08111f; color:white; margin:0; }
.container { padding:20px; }
.card { background:#101827; padding:15px; margin-bottom:15px; border-radius:8px; }
button { padding:8px 12px; margin:5px; border:none; border-radius:6px; cursor:pointer; }
.green { background:#22c55e; }
.blue { background:#3b82f6; }
.gold { background:#f59e0b; }
.red { background:#ef4444; }
</style>
</head>

<body>
<div class="container">

<h2>Admin Orders</h2>

<div id="orders"></div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzNJGmslRrVu7fOrW7M_gufm6gtL5IOoR0_UwJKb2PHxWCkH6JFD6GsyS50c3JYNcbmMg/exec";

async function loadOrders() {
  const res = await fetch(API_URL);
  const data = await res.json();

  let html = "";

  data.forEach(order => {
    html += `
      <div class="card">
        <b>${order.name}</b><br>
        ${order.email}<br>
        ${order.plan}<br>
        Status: ${order.status}<br><br>

        <button class="blue" onclick="updateStatus('${order.id}','CONTACTED')">Contacted</button>
        <button class="gold" onclick="updateStatus('${order.id}','PAYMENT SENT')">Payment Sent</button>
        <button class="green" onclick="updateStatus('${order.id}','PAID')">Paid</button>
        <button class="green" onclick="updateStatus('${order.id}','COMPLETED')">Completed</button>

        <br><br>

        <button onclick="copyCash('${order.name}', '${order.plan}')">Cash App</button>
        <button onclick="copyZelle('${order.name}', '${order.plan}')">Zelle</button>
        <button onclick="copyPayPal('${order.name}', '${order.plan}')">PayPal</button>
        <button onclick="copySetup()">Setup</button>
      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

async function updateStatus(id, status) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "update",
      id,
      status
    })
  });
  loadOrders();
}

function copyCash(name, plan) {
  const msg = `Hi ${name}, your total is for ${plan}. Send via Cash App.`;
  navigator.clipboard.writeText(msg);
  alert("Copied");
}

function copyZelle(name, plan) {
  const msg = `Hi ${name}, send payment for ${plan} via Zelle.`;
  navigator.clipboard.writeText(msg);
  alert("Copied");
}

function copyPayPal(name, plan) {
  const msg = `Hi ${name}, I will send your PayPal link for ${plan}.`;
  navigator.clipboard.writeText(msg);
  alert("Copied");
}

function copySetup() {
  const msg = `Go here to setup: https://tgarrett10.github.io/4myIPTVservice-device-app-center/device-setup.html`;
  navigator.clipboard.writeText(msg);
  alert("Copied");
}

loadOrders();
</script>

</body>
</html>
