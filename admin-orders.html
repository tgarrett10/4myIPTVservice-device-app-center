<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Orders - 4MyIPTV Service</title>

<style>
:root{
  --bg:#08111f;
  --panel:#101827;
  --panel2:#0f172a;
  --border:#1f2937;
  --text:#f8fafc;
  --muted:#94a3b8;
  --blue:#3b82f6;
  --green:#22c55e;
  --red:#ef4444;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

h1{
  margin:0 0 10px;
}

.sub{
  color:var(--muted);
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:350px 1fr;
  gap:20px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
  background:var(--panel2);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:8px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  background:var(--blue);
  color:white;
}

.msg{
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  display:none;
}

.success{
  background:#065f46;
  display:block;
}

.error{
  background:#7f1d1d;
  display:block;
}

.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

th{
  background:var(--panel2);
  font-size:12px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Admin Orders</h1>
  <div class="sub">4MyIPTV Service • Stream More • Pay Less • Watch Anywhere</div>

  <div class="grid">

    <!-- FORM -->
    <div class="card">
      <h2>Add Order</h2>

      <form id="orderForm">

        <label>Customer Name</label>
        <input id="customerName" required>

        <label>Email</label>
        <input id="emailAddress">

        <label>Phone</label>
        <input id="phoneNumber">

        <label>Customer Type</label>
        <select id="customerType">
          <option value="">Select</option>
          <option>Online Only</option>
          <option>Device Customer</option>
          <option>Existing Customer</option>
        </select>

        <label>Fulfillment Type</label>
        <select id="fulfillmentType">
          <option>Cash App</option>
          <option>Zelle</option>
          <option>Local Pickup / Meetup</option>
        </select>

        <label>Device</label>
        <input id="deviceSelected">

        <label>Status</label>
        <select id="orderStatus">
          <option>NEW REQUEST</option>
          <option>PAYMENT SENT</option>
          <option>Paid - Review Needed</option>
        </select>

        <label>Notes</label>
        <textarea id="notes"></textarea>

        <button class="btn" type="submit">Save Order</button>

      </form>

      <div id="msg" class="msg"></div>
    </div>

    <!-- TABLE -->
    <div class="card">
      <h2>Orders</h2>

      <input id="search" placeholder="Search...">

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Device</th>
              <th>Status</th>
              <th>Payment</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

    </div>

  </div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbw43Nl96gj81hdLjsfYf4K7NVluuo75olmL1NPzOQSt1EKkjoeObmdGOEjq910yTmkToQ/exec";

const form = document.getElementById("orderForm");
const msg = document.getElementById("msg");
const tableBody = document.getElementById("tableBody");
const search = document.getElementById("search");

let data = [];

function showMsg(type, text){
  msg.className = "msg " + type;
  msg.innerText = text;
}

function loadOrders(){
  fetch(URL)
  .then(r=>r.json())
  .then(res=>{
    data = res;
    render();
  });
}

function render(){
  const term = search.value.toLowerCase();

  const filtered = data.filter(o =>
    JSON.stringify(o).toLowerCase().includes(term)
  );

  tableBody.innerHTML = filtered.map(o=>`
    <tr>
      <td>${o.id || ""}</td>
      <td>${o.customerName || ""}</td>
      <td>${o.emailAddress || ""}</td>
      <td>${o.deviceSelected || ""}</td>
      <td>${o.orderStatus || ""}</td>
      <td>${o.fulfillmentType || ""}</td>
    </tr>
  `).join("");
}

form.addEventListener("submit", async e=>{
  e.preventDefault();

  const payload = {
    customerName: document.getElementById("customerName").value,
    emailAddress: document.getElementById("emailAddress").value,
    phoneNumber: document.getElementById("phoneNumber").value,
    customerType: document.getElementById("customerType").value,
    fulfillmentType: document.getElementById("fulfillmentType").value,
    deviceSelected: document.getElementById("deviceSelected").value,
    orderStatus: document.getElementById("orderStatus").value,
    notes: document.getElementById("notes").value
  };

  try{
    await fetch(URL, {
      method:"POST",
      body: JSON.stringify(payload)
    });

    showMsg("success","Order Saved");
    form.reset();
    loadOrders();

  }catch(err){
    showMsg("error","Error saving order");
  }
});

search.addEventListener("input", render);

loadOrders();

</script>

</body>
</html>
