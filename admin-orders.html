<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4MyIPTV Service | Admin Orders</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }

    .topbar {
      background: #111827;
      color: #ffffff;
      padding: 18px 24px;
      border-bottom: 4px solid #6d28d9;
    }

    .topbar h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
    }

    .topbar p {
      margin: 6px 0 0;
      font-size: 14px;
      color: #d1d5db;
    }

    .page-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .panel {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 20px;
      margin-bottom: 20px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 220px 220px 160px;
      gap: 12px;
      align-items: end;
    }

    .field-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #374151;
    }

    .field-group input,
    .field-group select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      background: #ffffff;
    }

    .btn {
      display: inline-block;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #6d28d9;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #5b21b6;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    .stat-card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      padding: 18px;
    }

    .stat-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1300px;
      background: #ffffff;
    }

    thead {
      background: #111827;
      color: #ffffff;
    }

    th,
    td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    .pill {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill-new {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .pill-payment-sent {
      background: #fef3c7;
      color: #92400e;
    }

    .pill-complete {
      background: #dcfce7;
      color: #166534;
    }

    .pill-other {
      background: #e5e7eb;
      color: #374151;
    }

    .muted {
      color: #6b7280;
    }

    .small {
      font-size: 12px;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .message.ok {
      color: #166534;
    }

    .message.error {
      color: #b91c1c;
    }

    .empty-state {
      text-align: center;
      padding: 36px 16px;
      color: #6b7280;
      font-size: 15px;
    }

    .footer-note {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
    }

    @media (max-width: 1100px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .status-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .status-row {
        grid-template-columns: 1fr;
      }

      .topbar h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>4MyIPTV Service Admin Orders</h1>
    <p>Stream More • Pay Less • Watch Anywhere</p>
  </div>

  <div class="page-wrap">
    <div class="panel">
      <div class="controls">
        <div class="field-group">
          <label for="searchInput">Search Orders</label>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name, email, device, phone, status..."
          />
        </div>

        <div class="field-group">
          <label for="statusFilter">Status Filter</label>
          <select id="statusFilter">
            <option value="">All Statuses</option>
            <option value="NEW">New</option>
            <option value="PAYMENT SENT">Payment Sent</option>
            <option value="COMPLETE">Complete</option>
          </select>
        </div>

        <div class="field-group">
          <label for="sortFilter">Sort</label>
          <select id="sortFilter">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="name">Name A-Z</option>
          </select>
        </div>

        <div class="button-row">
          <button class="btn btn-primary" id="refreshBtn">Refresh Orders</button>
          <button class="btn btn-secondary" id="clearBtn">Clear Filters</button>
        </div>
      </div>

      <div id="message" class="message"></div>
      <div class="footer-note" id="endpointNote"></div>
    </div>

    <div class="status-row">
      <div class="stat-card">
        <div class="stat-title">Total Orders</div>
        <div class="stat-value" id="totalOrders">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">New</div>
        <div class="stat-value" id="newOrders">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Payment Sent</div>
        <div class="stat-value" id="paymentSentOrders">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Complete</div>
        <div class="stat-value" id="completeOrders">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Filtered View</div>
        <div class="stat-value" id="filteredOrders">0</div>
      </div>
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Created At</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Customer Type</th>
              <th>Order Type</th>
              <th>Device</th>
              <th>Fulfillment</th>
              <th>Status</th>
              <th>Payment</th>
              <th>Delivery</th>
              <th>Support Route</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody">
            <tr>
              <td colspan="14" class="empty-state">Loading orders...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    /*
      IMPORTANT:
      This is the Apps Script URL currently inserted from your recent chat.
      If your active web app URL is different, replace it here.
    */
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWO65X3uTAbWldiacxCD7ItLu5zpfZe1fDTWUlMGJyIPJXWcXaOsDXWHMQV-3-Ch7IcQ/exec";

    let allOrders = [];

    const messageEl = document.getElementById("message");
    const endpointNoteEl = document.getElementById("endpointNote");
    const ordersTableBody = document.getElementById("ordersTableBody");

    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const sortFilter = document.getElementById("sortFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const clearBtn = document.getElementById("clearBtn");

    const totalOrdersEl = document.getElementById("totalOrders");
    const newOrdersEl = document.getElementById("newOrders");
    const paymentSentOrdersEl = document.getElementById("paymentSentOrders");
    const completeOrdersEl = document.getElementById("completeOrders");
    const filteredOrdersEl = document.getElementById("filteredOrders");

    endpointNoteEl.textContent = "Connected endpoint: " + APPS_SCRIPT_URL;

    function setMessage(text, type = "") {
      messageEl.textContent = text;
      messageEl.className = "message";
      if (type) {
        messageEl.classList.add(type);
      }
    }

    function safeValue(value) {
      if (value === null || value === undefined || value === "") {
        return '<span class="muted">—</span>';
      }
      return escapeHtml(String(value));
    }

    function normalizeStatus(status) {
      return String(status || "").trim().toUpperCase();
    }

    function getStatusPill(status) {
      const normalized = normalizeStatus(status);
      let className = "pill pill-other";

      if (normalized === "NEW") {
        className = "pill pill-new";
      } else if (normalized === "PAYMENT SENT") {
        className = "pill pill-payment-sent";
      } else if (normalized === "COMPLETE") {
        className = "pill pill-complete";
      }

      return '<span class="' + className + '">' + (escapeHtml(status || "—")) + "</span>";
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeOrder(row) {
      return {
        id: row.id || row.ID || "",
        createdAt: row.createdAt || row["Created At"] || row.timestamp || row.date || "",
        customerName: row.customerName || row.name || row.customer || row["Customer Name"] || "",
        emailAddress: row.emailAddress || row.email || row["Email Address"] || "",
        phoneNumber: row.phoneNumber || row.phone || row["Phone Number"] || "",
        customerType: row.customerType || row["Customer Type"] || "",
        orderType: row.orderType || row["Order Type"] || "",
        deviceSelected: row.deviceSelected || row.device || row["Device Selected"] || "",
        fulfillmentType: row.fulfillmentType || row.fulfillment || row["Fulfillment Type"] || "",
        orderStatus: row.orderStatus || row.status || row["Order Status"] || "",
        paymentStatus: row.paymentStatus || row["Payment Status"] || "",
        deliveryStatus: row.deliveryStatus || row["Delivery Status"] || "",
        supportRoute: row.supportRoute || row["Support Route"] || "",
        notes: row.notes || row["Notes"] || row.test || ""
      };
    }

    function updateStats(sourceOrders, filteredOrders) {
      totalOrdersEl.textContent = sourceOrders.length;
      newOrdersEl.textContent = sourceOrders.filter(o => normalizeStatus(o.orderStatus) === "NEW").length;
      paymentSentOrdersEl.textContent = sourceOrders.filter(o => normalizeStatus(o.orderStatus) === "PAYMENT SENT").length;
      completeOrdersEl.textContent = sourceOrders.filter(o => normalizeStatus(o.orderStatus) === "COMPLETE").length;
      filteredOrdersEl.textContent = filteredOrders.length;
    }

    function sortOrders(orders) {
      const sortValue = sortFilter.value;

      const sorted = [...orders];

      if (sortValue === "name") {
        sorted.sort((a, b) => String(a.customerName || "").localeCompare(String(b.customerName || "")));
        return sorted;
      }

      if (sortValue === "oldest") {
        sorted.sort((a, b) => String(a.createdAt || "").localeCompare(String(b.createdAt || "")));
        return sorted;
      }

      sorted.sort((a, b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")));
      return sorted;
    }

    function getFilteredOrders() {
      const searchText = searchInput.value.trim().toLowerCase();
      const selectedStatus = statusFilter.value.trim().toUpperCase();

      let filtered = [...allOrders];

      if (selectedStatus) {
        filtered = filtered.filter(order => normalizeStatus(order.orderStatus) === selectedStatus);
      }

      if (searchText) {
        filtered = filtered.filter(order => {
          const combined = [
            order.id,
            order.createdAt,
            order.customerName,
            order.emailAddress,
            order.phoneNumber,
            order.customerType,
            order.orderType,
            order.deviceSelected,
            order.fulfillmentType,
            order.orderStatus,
            order.paymentStatus,
            order.deliveryStatus,
            order.supportRoute,
            order.notes
          ].join(" ").toLowerCase();

          return combined.includes(searchText);
        });
      }

      return sortOrders(filtered);
    }

    function renderOrders() {
      const filtered = getFilteredOrders();
      updateStats(allOrders, filtered);

      if (!filtered.length) {
        ordersTableBody.innerHTML = `
          <tr>
            <td colspan="14" class="empty-state">No orders found for the current filter.</td>
          </tr>
        `;
        return;
      }

      ordersTableBody.innerHTML = filtered.map(order => `
        <tr>
          <td>${safeValue(order.id)}</td>
          <td>${safeValue(order.createdAt)}</td>
          <td>${safeValue(order.customerName)}</td>
          <td>${safeValue(order.emailAddress)}</td>
          <td>${safeValue(order.phoneNumber)}</td>
          <td>${safeValue(order.customerType)}</td>
          <td>${safeValue(order.orderType)}</td>
          <td>${safeValue(order.deviceSelected)}</td>
          <td>${safeValue(order.fulfillmentType)}</td>
          <td>${getStatusPill(order.orderStatus)}</td>
          <td>${safeValue(order.paymentStatus)}</td>
          <td>${safeValue(order.deliveryStatus)}</td>
          <td>${safeValue(order.supportRoute)}</td>
          <td>${safeValue(order.notes)}</td>
        </tr>
      `).join("");
    }

    async function loadOrders() {
      setMessage("Loading orders...", "");
      ordersTableBody.innerHTML = `
        <tr>
          <td colspan="14" class="empty-state">Loading orders...</td>
        </tr>
      `;

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "GET",
          redirect: "follow"
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status + " returned from Apps Script.");
        }

        const data = await response.json();

        let orders = [];

        if (Array.isArray(data)) {
          orders = data;
        } else if (Array.isArray(data.orders)) {
          orders = data.orders;
        } else if (Array.isArray(data.data)) {
          orders = data.data;
        } else if (data.success && Array.isArray(data.rows)) {
          orders = data.rows;
        } else {
          throw new Error("Response format was received, but no order array was found.");
        }

        allOrders = orders.map(normalizeOrder);

        setMessage("Orders loaded successfully.", "ok");
        renderOrders();
      } catch (error) {
        console.error("Admin Orders Load Error:", error);
        setMessage("Unable to load orders. " + error.message, "error");
        ordersTableBody.innerHTML = `
          <tr>
            <td colspan="14" class="empty-state">
              Unable to load orders.<br />
              <span class="small">Check the Apps Script URL and confirm the Web App is deployed correctly.</span>
            </td>
          </tr>
        `;
        updateStats([], []);
      }
    }

    refreshBtn.addEventListener("click", loadOrders);

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      statusFilter.value = "";
      sortFilter.value = "newest";
      renderOrders();
      setMessage("Filters cleared.", "ok");
    });

    searchInput.addEventListener("input", renderOrders);
    statusFilter.addEventListener("change", renderOrders);
    sortFilter.addEventListener("change", renderOrders);

    loadOrders();
  </script>
</body>
</html>
