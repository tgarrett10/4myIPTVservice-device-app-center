<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>4MyTechService Checkout</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#0f172a;
  color:#e5e7eb;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.card{
  background:#111827;
  border:1px solid #334155;
  border-radius:14px;
  padding:20px;
  margin-bottom:18px;
}
h1,h2{margin-top:0}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}
input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}
label{display:block;margin-bottom:6px}
.field{margin-bottom:14px}

.summary{
  background:#020617;
  border:1px solid #334155;
  border-radius:10px;
  padding:14px;
}
.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
.total{
  font-weight:bold;
  color:#86efac;
  border-top:1px solid #334155;
  padding-top:10px;
}

.status{
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  display:none;
}
.success{
  display:block;
  background:#052e16;
  border:1px solid #166534;
}
.error{
  display:block;
  background:#450a0a;
  border:1px solid #991b1b;
}
</style>
</head>

<body>

<div class="container">
<h1>4MyTechService Checkout</h1>

<div class="grid">

<div class="card">
<h2>Service Details</h2>

<div class="field">
<label>Service Title</label>
<input id="serviceTitle" placeholder="Example: Device setup"/>
</div>

<div class="field">
<label>Description</label>
<textarea id="serviceDescription"></textarea>
</div>

<div class="field">
<label>Approved Amount (USD)</label>
<input id="amount" type="number" value="50" readonly/>
</div>

<div class="field">
<label>Optional Tip (USD)</label>
<input id="tip" type="number" value="0" min="0" step="1"/>
</div>

</div>

<div class="card">
<h2>Customer Info</h2>

<div class="field">
<label>Name</label>
<input id="name"/>
</div>

<div class="field">
<label>Email</label>
<input id="email"/>
</div>

<div class="field">
<label>Phone</label>
<input id="phone"/>
</div>

<h2>Order Summary</h2>
<div class="summary">
<div class="row"><span>Service</span><span id="sumService">-</span></div>
<div class="row"><span>Amount</span><span id="sumAmount">$0</span></div>
<div class="row"><span>Tip</span><span id="sumTip">$0</span></div>
<div class="row total"><span>Total</span><span id="sumTotal">$0</span></div>
</div>

<div id="paypal-button-container" style="margin-top:14px;"></div>
<div id="status" class="status"></div>

</div>

</div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyFGoXc-PfNNrCMb6dMSlGkE7w5CAF_7ObTslWoN2VHQU6OH7t_GZkzl4WD8miiAmIj/exec";

function updateSummary(){
  const service = document.getElementById('serviceTitle').value || '-';
  const amount = Number(document.getElementById('amount').value || 0);
  const tip = Number(document.getElementById('tip').value || 0);
  const total = amount + tip;

  document.getElementById('sumService').textContent = service;
  document.getElementById('sumAmount').textContent = '$'+amount.toFixed(2);
  document.getElementById('sumTip').textContent = '$'+tip.toFixed(2);
  document.getElementById('sumTotal').textContent = '$'+total.toFixed(2);
}

document.querySelectorAll('input,textarea').forEach(el=>{
  el.addEventListener('input', updateSummary);
});

function showStatus(msg,type){
  const box = document.getElementById('status');
  box.className = 'status ' + type;
  box.textContent = msg;
}

function validate(){
  if(!document.getElementById('name').value ||
     !document.getElementById('email').value){
     showStatus('Fill out required fields','error');
     return false;
  }
  return true;
}

async function saveOrder(data){
  await fetch(scriptURL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  });
}

function renderPayPal(){
paypal.Buttons({

createOrder: function(data, actions){
  if(!validate()) return;

  const amount = Number(document.getElementById('amount').value);
  const tip = Number(document.getElementById('tip').value || 0);
  const total = amount + tip;

  return actions.order.create({
    purchase_units:[{
      amount:{value: total.toFixed(2)}
    }]
  });
},

onApprove: async function(data, actions){
  const details = await actions.order.capture();

  const order = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    service: document.getElementById('serviceTitle').value,
    amount: document.getElementById('amount').value,
    tip: document.getElementById('tip').value,
    total: document.getElementById('sumTotal').textContent,
    paypalId: details.id,
    time: new Date().toISOString()
  };

  try{
    await saveOrder(order);
    showStatus('Payment successful. Order saved.','success');
  }catch{
    showStatus('Payment completed but saving failed.','error');
  }
},

onError: function(err){
  console.error(err);
  showStatus('PayPal error. Try again.','error');
}

}).render('#paypal-button-container');
}

updateSummary();
</script>

<script src="https://www.paypal.com/sdk/js?client-id=AWGNEkU-dS6LJz4eaNHNB93LP5SxnRc377VvcdF7BIVE8jYXiK2Banltv9Cr85F9jMQLp33GoOplY5yu&currency=USD"></script>

<script>
renderPayPal();
</script>

</body>
</html>
