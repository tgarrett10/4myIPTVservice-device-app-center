<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>4MyIPTV Service Admin Dashboard</title>
<style>
:root{
  --bg:#08111f;
  --panel:#101827;
  --text:#f8fafc;
  --muted:#94a3b8;
  --green:#22c55e;
  --blue:#3b82f6;
  --purple:#9333ea;
  --border:#1f2937;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(180deg,#08111f,#0f172a);
  color:var(--text);
}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}
h1{margin:0 0 10px;color:#86efac;text-align:center}
.tagline{
  text-align:center;
  margin-bottom:20px;
  color:#cbd5f5;
  font-weight:600;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}
.btn{
  display:block;
  text-align:center;
  padding:16px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  border:1px solid #334155;
}
.btn:hover{opacity:.9}
.blue{background:#1d4ed8}
.green{background:#166534}
.purple{background:#7e22ce}
.gray{background:#475569}
.footer{
  text-align:center;
  color:#94a3b8;
  margin-top:20px;
  font-size:13px;
}
@media(max-width:700px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <h1>4MyIPTV Service Admin</h1>
    <div class="tagline">Stream More • Pay Less • Watch Anywhere</div>
  </div>

  <div class="grid">

    <a href="admin-orders.html" class="btn blue">
      Manage Orders
    </a>

    <a href="admin-apk-library.html" class="btn purple">
      APK Library
    </a>

    <a href="admin-resource-center.html" class="btn green">
      Resource Center
    </a>

    <a href="admin-update-checker.html" class="btn gray">
      System Updates
    </a>

  </div>

  <div class="footer">
    Internal System Dashboard • All customer data managed through Admin Orders
  </div>

</div>
</body>
</html>
