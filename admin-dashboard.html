<!DOCTYPE html>
<html>
<head>
  <title>Admin Order Dashboard</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    h1, h2 {
      margin-bottom: 10px;
    }
    input {
      padding: 10px;
      width: 420px;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    button, select {
      padding: 10px 14px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      border: 1px solid #334155;
      font-size: 14px;
      vertical-align: top;
    }
    th {
      background: #1e293b;
    }
    .message {
      margin-top: 10px;
      font-weight: bold;
    }
    .success {
      color: #86efac;
    }
    .error {
      color: #fca5a5;
    }
  </style>
</head>
<body>

<h1>Order Dashboard</h1>

<input id="apiUrl" placeholder="Paste your Apps Script URL here" />
<button onclick="saveUrl()">Save URL</button>
<button onclick="loadOrders()">Load Orders</button>

<div id="message" class="message"></div>

<table id="ordersTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Service</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Update Status</th>
    </tr>
  </thead>
  <tbody>
    <tr><td colspan="6">No data loaded yet.</td></tr>
  </tbody>
</table>

<script>
  function showMessage(text, type) {
    const message = document.getElementById('message');
    message.className = 'message ' + type;
    message.textContent = text;
  }

  function saveUrl() {
    const url = document.getElementById('apiUrl').value.trim();
    localStorage.setItem('apiUrl', url);
    alert('Saved');
  }

  function getField(order, possibleNames) {
    for (const name of possibleNames) {
      if (order[name] !== undefined && order[name] !== null && order[name] !== '') {
        return order[name];
      }
    }
    return '';
  }

  async function updateStatus(rowNumber, newStatus) {
    const url = localStorage.getItem('apiUrl');

    if (!url) {
      showMessage('API URL is missing.', 'error');
      return;
    }

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action: 'updateStatus',
          rowNumber: rowNumber,
          status: newStatus
        })
      });

      const result = await response.json();

      if (result.success) {
        showMessage('Status updated successfully.', 'success');
        loadOrders();
      } else {
        showMessage('Status update failed: ' + (result.error || 'Unknown error'), 'error');
      }
    } catch (error) {
      console.error(error);
      showMessage('Error updating status: ' + error.message, 'error');
    }
  }

  function buildStatusDropdown(currentStatus, rowNumber) {
    const options = [
      'New Lead',
      'Paid - Awaiting Fulfillment',
      'In Progress',
      'Completed',
      'Follow Up'
    ];

    const selectId = 'status_' + rowNumber;

    const optionsHtml = options.map(status => {
      const selected = status === currentStatus ? 'selected' : '';
      return `<option value="${status}" ${selected}>${status}</option>`;
    }).join('');

    return `
      <select id="${selectId}">
        ${optionsHtml}
      </select>
      <button onclick="updateStatus(${rowNumber}, document.getElementById('${selectId}').value)">Save</button>
    `;
  }

  function loadOrders() {
    const url = localStorage.getItem('apiUrl');

    if (!url) {
      alert('Enter your API URL first');
      return;
    }

    fetch(url)
      .then(res => res.json())
      .then(data => {
        const table = document.querySelector('#ordersTable tbody');
        table.innerHTML = '';

        if (!Array.isArray(data) || data.length === 0) {
          table.innerHTML = '<tr><td colspan="6">No orders found.</td></tr>';
          return;
        }

        data.slice().reverse().forEach(order => {
          const rowNumber = getField(order, ['RowNumber']);
          const fullName = getField(order, ['FullName', 'fullName', 'Name', 'name']);
          const email = getField(order, ['Email', 'email']);
          const planName = getField(order, ['PlanName', 'planName', 'Service', 'service']);
          const amount = getField(order, ['Amount', 'amount']);
          const status = getField(order, ['Status', 'status']);

          const row = `
            <tr>
              <td>${fullName}</td>
              <td>${email}</td>
              <td>${planName}</td>
              <td>$${amount}</td>
              <td>${status}</td>
              <td>${buildStatusDropdown(status, rowNumber)}</td>
            </tr>
          `;
          table.innerHTML += row;
        });
      })
      .catch(err => {
        console.error(err);
        showMessage('Error loading orders.', 'error');
      });
  }

  window.onload = () => {
    const saved = localStorage.getItem('apiUrl');
    if (saved) {
      document.getElementById('apiUrl').value = saved;
    }
  };
</script>

</body>
</html>
