<!DOCTYPE html>
<html>
<head>
  <title>4MyIPTV Service Admin Order Dashboard</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
      margin: 0;
    }

    h1, h2, h3 {
      margin-bottom: 10px;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
      align-items: center;
    }

    input, select, button, textarea {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #334155;
      font-size: 14px;
      font-family: Arial, Helvetica, sans-serif;
    }

    input, textarea {
      background: white;
      color: black;
    }

    select {
      background: white;
      color: black;
    }

    button {
      cursor: pointer;
      background: #1e293b;
      color: white;
    }

    button:hover {
      opacity: 0.92;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .primary-btn {
      background: #2563eb;
    }

    .success-btn {
      background: #166534;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 20px 0;
    }

    .stat-card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px;
    }

    .stat-label {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
    }

    .message {
      margin-top: 10px;
      font-weight: bold;
      min-height: 22px;
    }

    .success {
      color: #86efac;
    }

    .error {
      color: #fca5a5;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      align-items: start;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: #111827;
    }

    th, td {
      padding: 10px;
      border: 1px solid #334155;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #1e293b;
      text-align: left;
    }

    tr.clickable {
      cursor: pointer;
    }

    tr.clickable:hover {
      background: #172033;
    }

    tr.selected-row {
      background: #1e3a5f;
    }

    .details-panel {
      margin-top: 20px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px;
      position: sticky;
      top: 20px;
    }

    .detail-row {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #334155;
    }

    .detail-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .detail-label {
      color: #94a3b8;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 14px;
      word-break: break-word;
      line-height: 1.45;
    }

    .detail-input,
    .detail-select,
    .detail-textarea {
      width: 100%;
      margin-top: 6px;
    }

    .detail-textarea {
      min-height: 90px;
      resize: vertical;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .empty-note {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid #334155;
      background: #111827;
      color: white;
      cursor: pointer;
    }

    .pill.active {
      background: #2563eb;
      border-color: #3b82f6;
    }

    .muted {
      color: #94a3b8;
      font-size: 13px;
    }

    .status-cell {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .status-cell select {
      min-width: 160px;
    }

    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .details-panel {
        position: static;
      }
    }

    @media (max-width: 600px) {
      .stats {
        grid-template-columns: 1fr;
      }
      input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<h1>4MyIPTV Service Order Dashboard</h1>

<div class="top-bar">
  <input id="apiUrl" placeholder="Paste your Apps Script URL here" />
  <button id="saveUrlBtn" type="button">Save URL</button>
  <button id="loadOrdersBtn" type="button" class="primary-btn">Load Orders</button>
</div>

<div class="top-bar">
  <input id="searchInput" placeholder="Search name, email, or service" />
  <select id="statusFilter">
    <option value="">All Statuses</option>
    <option value="New Lead">New Lead</option>
    <option value="Paid - Awaiting Fulfillment">Paid - Awaiting Fulfillment</option>
    <option value="In Progress">In Progress</option>
    <option value="Completed">Completed</option>
    <option value="Follow Up">Follow Up</option>
  </select>
</div>

<div class="pill-row" id="quickFilters">
  <button type="button" class="pill active" data-filter="">All</button>
  <button type="button" class="pill" data-filter="New Lead">New Lead</button>
  <button type="button" class="pill" data-filter="Paid - Awaiting Fulfillment">Paid</button>
  <button type="button" class="pill" data-filter="In Progress">In Progress</button>
  <button type="button" class="pill" data-filter="Completed">Completed</button>
  <button type="button" class="pill" data-filter="Follow Up">Follow Up</button>
</div>

<div id="message" class="message"></div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total Orders</div>
    <div class="stat-value" id="statTotal">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Paid</div>
    <div class="stat-value" id="statPaid">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">In Progress</div>
    <div class="stat-value" id="statInProgress">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Completed</div>
    <div class="stat-value" id="statCompleted">0</div>
  </div>
</div>

<div class="layout">
  <div>
    <table id="ordersTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Service</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Update Status</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="6">No data loaded yet.</td></tr>
      </tbody>
    </table>
  </div>

  <div class="details-panel">
    <h3>Order Details</h3>
    <div id="detailsContent" class="empty-note">Click an order row to view details.</div>
  </div>
</div>

<script>
  let allOrders = [];
  let selectedOrderId = null;
  let isLoadingOrders = false;

  const BRAND_NAME = '4MyIPTV Service';
  const BRAND_TAGLINE = 'Stream More • Pay Less • Watch Anywhere';
  const SUPPORT_EMAIL = '4myIPTVservice@gmail.com';
  const SUPPORT_BOT = '@myiptvservice_support_bot';
  const LIVE_SUPPORT = '@myiptvservice4';

  const apiUrlInput = document.getElementById('apiUrl');
  const searchInput = document.getElementById('searchInput');
  const statusFilter = document.getElementById('statusFilter');
  const quickFilters = document.getElementById('quickFilters');
  const ordersTableBody = document.querySelector('#ordersTable tbody');
  const detailsContent = document.getElementById('detailsContent');
  const saveUrlBtn = document.getElementById('saveUrlBtn');
  const loadOrdersBtn = document.getElementById('loadOrdersBtn');

  function showMessage(text, type) {
    const message = document.getElementById('message');
    message.className = 'message ' + type;
    message.textContent = text;
  }

  function saveUrl() {
    const url = apiUrlInput.value.trim();
    if (!url) {
      showMessage('Please paste your Apps Script URL before saving.', 'error');
      return;
    }
    localStorage.setItem('apiUrl', url);
    showMessage('API URL saved.', 'success');
  }

  function getEffectiveApiUrl() {
    const typedUrl = apiUrlInput.value.trim();
    const savedUrl = localStorage.getItem('apiUrl') || '';
    return typedUrl || savedUrl.trim();
  }

  function getField(order, possibleNames) {
    for (const name of possibleNames) {
      if (order && order[name] !== undefined && order[name] !== null && order[name] !== '') {
        return order[name];
      }
    }
    return '';
  }

  function getRowId(order) {
    return String(getField(order, ['RowNumber', 'rowNumber', 'row_number']));
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function displayValue(value, fallback = 'Not provided') {
    const clean = String(value || '').trim();
    return clean ? escapeHtml(clean) : '<span class="muted">' + escapeHtml(fallback) + '</span>';
  }

  function updateStats(orders) {
    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statPaid').textContent = orders.filter(o =>
      String(getField(o, ['Status', 'status'])).includes('Paid')
    ).length;
    document.getElementById('statInProgress').textContent = orders.filter(o =>
      String(getField(o, ['Status', 'status'])) === 'In Progress'
    ).length;
    document.getElementById('statCompleted').textContent = orders.filter(o =>
      String(getField(o, ['Status', 'status'])) === 'Completed'
    ).length;
  }

  function syncQuickFiltersFromDropdown() {
    const current = statusFilter.value;
    const buttons = Array.from(document.querySelectorAll('#quickFilters .pill'));
    buttons.forEach(btn => btn.classList.remove('active'));
    const match = buttons.find(btn => btn.dataset.filter === current);
    if (match) {
      match.classList.add('active');
    }
  }

  function setLoadingState(loading) {
    isLoadingOrders = loading;
    loadOrdersBtn.disabled = loading;
    saveUrlBtn.disabled = loading;

    if (loading) {
      loadOrdersBtn.textContent = 'Loading...';
    } else {
      loadOrdersBtn.textContent = 'Load Orders';
    }
  }

  function getSelectedOrder() {
    if (!selectedOrderId) return null;
    return allOrders.find(order => getRowId(order) === selectedOrderId) || null;
  }

  function setSelectedOrder(order) {
    if (!order) {
      selectedOrderId = null;
      return;
    }
    selectedOrderId = getRowId(order) || null;
  }

  function getFilteredOrders() {
    const searchText = searchInput.value.toLowerCase().trim();
    const currentStatusFilter = statusFilter.value;

    let filtered = allOrders.slice().reverse();

    if (searchText) {
      filtered = filtered.filter(order => {
        const fullName = String(getField(order, ['FullName', 'fullName', 'Name', 'name'])).toLowerCase();
        const email = String(getField(order, ['Email', 'email'])).toLowerCase();
        const planName = String(getField(order, ['PlanName', 'planName', 'Service', 'service'])).toLowerCase();
        return fullName.includes(searchText) || email.includes(searchText) || planName.includes(searchText);
      });
    }

    if (currentStatusFilter) {
      filtered = filtered.filter(order => {
        const status = String(getField(order, ['Status', 'status']));
        return status === currentStatusFilter;
      });
    }

    return filtered;
  }

  function buildPrintHtml(order) {
    const fullName = getField(order, ['FullName', 'fullName', 'Name', 'name']);
    const email = getField(order, ['Email', 'email']);
    const phone = getField(order, ['Phone', 'phone']);
    const address = getField(order, ['Address', 'address']);
    const service = getField(order, ['PlanName', 'planName', 'Service', 'service']);
    const amount = getField(order, ['Amount', 'amount']);
    const status = getField(order, ['Status', 'status']);
    const orderShipped = getField(order, ['OrderShipped', 'orderShipped']);
    const trackingNumber = getField(order, ['TrackingNumber', 'trackingNumber']);
    const deviceType = getField(order, ['DeviceType', 'deviceType']);
    const deviceNickname = getField(order, ['DeviceNickname', 'deviceNickname']);
    const notes = getField(order, ['Notes', 'notes']);
    const paymentType = getField(order, ['PaymentType', 'paymentType']);
    const timestamp = getField(order, ['Timestamp', 'timestamp']);

    function safe(value) {
      return String(value || '').trim() || 'Not provided';
    }

    const safeBrandName = escapeHtml(BRAND_NAME);
    const safeTagline = escapeHtml(BRAND_TAGLINE);
    const safeSupportEmail = escapeHtml(SUPPORT_EMAIL);
    const safeSupportBot = escapeHtml(SUPPORT_BOT);
    const safeLiveSupport = escapeHtml(LIVE_SUPPORT);

    return `
      <!DOCTYPE html>
      <html>
      <head>
        <title>${safeBrandName} Customer Record</title>
        <style>
          body {
            font-family: Arial, Helvetica, sans-serif;
            color: #111827;
            margin: 0;
            background: #ffffff;
          }

          .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 34px 40px;
          }

          .brand-header {
            border: 2px solid #0f172a;
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 18px;
            background: linear-gradient(180deg, #f8fafc, #eef2f7);
          }

          .brand-name {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
          }

          .brand-tagline {
            font-size: 14px;
            font-weight: 600;
            color: #2563eb;
            letter-spacing: 0.03em;
            margin-bottom: 14px;
          }

          .document-title {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: #0f172a;
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
          }

          .intro-note {
            margin-top: 14px;
            font-size: 14px;
            color: #334155;
            line-height: 1.5;
          }

          .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
          }

          .section-card {
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            overflow: hidden;
            background: #ffffff;
          }

          .section-head {
            background: #0f172a;
            color: #ffffff;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
          }

          .section-body {
            padding: 14px;
          }

          .row {
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
          }

          .row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
          }

          .label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
          }

          .value {
            font-size: 14px;
            color: #111827;
            line-height: 1.5;
            word-break: break-word;
          }

          .full-width {
            margin-bottom: 16px;
          }

          .notes-box {
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
          }

          .notes-body {
            padding: 14px;
            min-height: 90px;
            white-space: pre-wrap;
            line-height: 1.5;
            color: #111827;
          }

          .support-box {
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
          }

          .support-body {
            padding: 14px;
            background: #f8fafc;
          }

          .support-line {
            margin-bottom: 10px;
          }

          .support-line:last-child {
            margin-bottom: 0;
          }

          .footer-note {
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.5;
            color: #475569;
            text-align: center;
          }

          .receipt-note {
            margin-top: 8px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
          }

          @media print {
            body {
              background: #ffffff;
            }

            .page {
              max-width: 100%;
              padding: 14px 18px 18px;
            }

            .grid {
              grid-template-columns: 1fr 1fr;
              gap: 12px;
            }
          }
        </style>
      </head>
      <body>
        <div class="page">
          <div class="brand-header">
            <div class="brand-name">${safeBrandName}</div>
            <div class="brand-tagline">${safeTagline}</div>
            <div class="document-title">Customer Record / Service Summary</div>
            <div class="intro-note">
              This document serves as a customer service record and may also be used as a printed order summary or receipt-style handoff copy.
            </div>
          </div>

          <div class="grid">
            <div class="section-card">
              <div class="section-head">Customer Information</div>
              <div class="section-body">
                <div class="row"><div class="label">Full Name</div><div class="value">${escapeHtml(safe(fullName))}</div></div>
                <div class="row"><div class="label">Email</div><div class="value">${escapeHtml(safe(email))}</div></div>
                <div class="row"><div class="label">Phone</div><div class="value">${escapeHtml(safe(phone))}</div></div>
                <div class="row"><div class="label">Address</div><div class="value">${escapeHtml(safe(address))}</div></div>
              </div>
            </div>

            <div class="section-card">
              <div class="section-head">Order Information</div>
              <div class="section-body">
                <div class="row"><div class="label">Service</div><div class="value">${escapeHtml(safe(service))}</div></div>
                <div class="row"><div class="label">Amount</div><div class="value">$${escapeHtml(safe(amount))}</div></div>
                <div class="row"><div class="label">Status</div><div class="value">${escapeHtml(safe(status))}</div></div>
                <div class="row"><div class="label">Payment Type</div><div class="value">${escapeHtml(safe(paymentType))}</div></div>
                <div class="row"><div class="label">Timestamp</div><div class="value">${escapeHtml(safe(timestamp))}</div></div>
              </div>
            </div>
          </div>

          <div class="grid">
            <div class="section-card">
              <div class="section-head">Device / Delivery Details</div>
              <div class="section-body">
                <div class="row"><div class="label">Device Type</div><div class="value">${escapeHtml(safe(deviceType))}</div></div>
                <div class="row"><div class="label">Device Nickname</div><div class="value">${escapeHtml(safe(deviceNickname))}</div></div>
                <div class="row"><div class="label">Order Shipped</div><div class="value">${escapeHtml(safe(orderShipped))}</div></div>
                <div class="row"><div class="label">Tracking Number</div><div class="value">${escapeHtml(safe(trackingNumber))}</div></div>
              </div>
            </div>

            <div class="section-card">
              <div class="section-head">Business Summary</div>
              <div class="section-body">
                <div class="row"><div class="label">Brand</div><div class="value">${safeBrandName}</div></div>
                <div class="row"><div class="label">Tagline</div><div class="value">${safeTagline}</div></div>
                <div class="row"><div class="label">Support Email</div><div class="value">${safeSupportEmail}</div></div>
                <div class="row"><div class="label">Support Bot</div><div class="value">${safeSupportBot}</div></div>
                <div class="row"><div class="label">Live Telegram Support</div><div class="value">${safeLiveSupport}</div></div>
              </div>
            </div>
          </div>

          <div class="notes-box">
            <div class="section-head">Notes</div>
            <div class="notes-body">${escapeHtml(safe(notes))}</div>
          </div>

          <div class="support-box">
            <div class="section-head">Support Information</div>
            <div class="support-body">
              <div class="support-line"><strong>Email:</strong> ${safeSupportEmail}</div>
              <div class="support-line"><strong>Support Bot:</strong> ${safeSupportBot}</div>
              <div class="support-line"><strong>Live Telegram Support:</strong> ${safeLiveSupport}</div>
            </div>
          </div>

          <div class="footer-note">
            Thank you for choosing ${safeBrandName}. We appreciate your support and the opportunity to help you enjoy a simpler, more flexible entertainment experience.
          </div>
          <div class="receipt-note">
            ${safeTagline}
          </div>
        </div>
      </body>
      </html>
    `;
  }

  function printSelectedOrder() {
    const selectedOrder = getSelectedOrder();

    if (!selectedOrder) {
      showMessage('Select an order first before printing.', 'error');
      return;
    }

    const printWindow = window.open('', '_blank');
    if (!printWindow) {
      showMessage('Pop-up blocked. Allow pop-ups for this page, then try printing again.', 'error');
      return;
    }

    printWindow.document.open();
    printWindow.document.write(buildPrintHtml(selectedOrder));
    printWindow.document.close();
    printWindow.focus();

    setTimeout(() => {
      printWindow.print();
    }, 300);
  }

  async function updateStatus(rowNumber, newStatus, buttonEl) {
    const url = getEffectiveApiUrl();

    if (!url) {
      showMessage('API URL is missing. Paste it into the field first.', 'error');
      return;
    }

    if (!rowNumber) {
      showMessage('This order is missing its row number, so status cannot be updated.', 'error');
      return;
    }

    const selectedBeforeSave = selectedOrderId;
    const originalText = buttonEl.textContent;

    buttonEl.disabled = true;
    buttonEl.textContent = 'Saving...';

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'updateStatus',
          rowNumber: rowNumber,
          status: newStatus
        })
      });

      const result = await response.json();

      if (result.success) {
        selectedOrderId = selectedBeforeSave || String(rowNumber);
        showMessage('Status updated successfully.', 'success');
        await loadOrders(true, selectedOrderId);
      } else {
        showMessage('Status update failed: ' + (result.error || 'Unknown error from Apps Script.'), 'error');
      }
    } catch (error) {
      console.error(error);
      showMessage('Error updating status: ' + error.message, 'error');
    } finally {
      buttonEl.disabled = false;
      buttonEl.textContent = originalText;
    }
  }

  async function updateOrderFields() {
    const selectedOrder = getSelectedOrder();

    if (!selectedOrder) {
      showMessage('Select an order first.', 'error');
      return;
    }

    const url = getEffectiveApiUrl();
    if (!url) {
      showMessage('API URL is missing. Paste it into the field first.', 'error');
      return;
    }

    const rowNumber = getField(selectedOrder, ['RowNumber']);
    if (!rowNumber) {
      showMessage('This order is missing its row number, so details cannot be updated.', 'error');
      return;
    }

    const orderShippedEl = document.getElementById('detailOrderShipped');
    const trackingNumberEl = document.getElementById('detailTrackingNumber');
    const notesEl = document.getElementById('detailNotes');
    const saveBtn = document.getElementById('saveDetailFieldsBtn');

    if (!orderShippedEl || !trackingNumberEl || !notesEl || !saveBtn) {
      showMessage('Detail fields are not ready. Please reselect the order and try again.', 'error');
      return;
    }

    const selectedBeforeSave = selectedOrderId;
    const orderShipped = orderShippedEl.value;
    const trackingNumber = trackingNumberEl.value.trim();
    const notes = notesEl.value.trim();

    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'updateOrderFields',
          rowNumber: rowNumber,
          orderShipped: orderShipped,
          trackingNumber: trackingNumber,
          notes: notes
        })
      });

      const result = await response.json();

      if (result.success) {
        selectedOrderId = selectedBeforeSave || String(rowNumber);
        showMessage('Order details updated successfully.', 'success');
        await loadOrders(true, selectedOrderId);
      } else {
        showMessage('Order detail update failed: ' + (result.error || 'Unknown error from Apps Script.'), 'error');
      }
    } catch (error) {
      console.error(error);
      showMessage('Error updating order details: ' + error.message, 'error');
    } finally {
      const refreshedSaveBtn = document.getElementById('saveDetailFieldsBtn');
      if (refreshedSaveBtn) {
        refreshedSaveBtn.disabled = false;
        refreshedSaveBtn.textContent = 'Save Shipping / Tracking / Notes';
      }
    }
  }

  function renderDetails(order) {
    if (!order) {
      detailsContent.innerHTML = 'Click an order row to view details.';
      return;
    }

    const fullName = getField(order, ['FullName', 'fullName', 'Name', 'name']);
    const email = getField(order, ['Email', 'email']);
    const phone = getField(order, ['Phone', 'phone']);
    const address = getField(order, ['Address', 'address']);
    const service = getField(order, ['PlanName', 'planName', 'Service', 'service']);
    const amount = getField(order, ['Amount', 'amount']);
    const status = getField(order, ['Status', 'status']);
    const orderShipped = getField(order, ['OrderShipped', 'orderShipped']);
    const trackingNumber = getField(order, ['TrackingNumber', 'trackingNumber']);
    const deviceType = getField(order, ['DeviceType', 'deviceType']);
    const deviceNickname = getField(order, ['DeviceNickname', 'deviceNickname']);
    const notes = getField(order, ['Notes', 'notes']);
    const paymentType = getField(order, ['PaymentType', 'paymentType']);
    const paypalId = getField(order, ['PayPalSubscriptionId', 'paypalSubscriptionId']);
    const timestamp = getField(order, ['Timestamp', 'timestamp']);

    detailsContent.innerHTML = `
      <div class="detail-row">
        <div class="detail-label">Full Name</div>
        <div class="detail-value">${displayValue(fullName)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Email</div>
        <div class="detail-value">${displayValue(email)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Phone</div>
        <div class="detail-value">${displayValue(phone)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Address</div>
        <div class="detail-value">${displayValue(address)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Service</div>
        <div class="detail-value">${displayValue(service)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Amount</div>
        <div class="detail-value">${String(amount).trim() ? '$' + escapeHtml(amount) : '<span class="muted">Not provided</span>'}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Status</div>
        <div class="detail-value">${displayValue(status)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Order Shipped</div>
        <select id="detailOrderShipped" class="detail-select">
          <option value="" ${orderShipped === '' ? 'selected' : ''}>Blank</option>
          <option value="No" ${String(orderShipped) === 'No' ? 'selected' : ''}>No</option>
          <option value="Yes" ${String(orderShipped) === 'Yes' ? 'selected' : ''}>Yes</option>
          <option value="Not Shipped" ${String(orderShipped) === 'Not Shipped' ? 'selected' : ''}>Not Shipped</option>
        </select>
      </div>
      <div class="detail-row">
        <div class="detail-label">Tracking Number</div>
        <input id="detailTrackingNumber" class="detail-input" value="${escapeHtml(trackingNumber)}" placeholder="Enter tracking number" />
      </div>
      <div class="detail-row">
        <div class="detail-label">Device Type</div>
        <div class="detail-value">${displayValue(deviceType)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Device Nickname</div>
        <div class="detail-value">${displayValue(deviceNickname)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Notes</div>
        <textarea id="detailNotes" class="detail-textarea" placeholder="Add internal notes here">${escapeHtml(notes)}</textarea>
      </div>
      <div class="detail-row">
        <div class="detail-label">Payment Type</div>
        <div class="detail-value">${displayValue(paymentType)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">PayPal ID</div>
        <div class="detail-value">${displayValue(paypalId)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Timestamp</div>
        <div class="detail-value">${displayValue(timestamp)}</div>
      </div>
      <div class="detail-actions">
        <button type="button" id="saveDetailFieldsBtn" class="success-btn">Save Shipping / Tracking / Notes</button>
        <button type="button" id="printCustomerBtn">Print Customer Record</button>
      </div>
    `;

    document.getElementById('saveDetailFieldsBtn').addEventListener('click', updateOrderFields);
    document.getElementById('printCustomerBtn').addEventListener('click', printSelectedOrder);
  }

  function renderOrders() {
    const filtered = getFilteredOrders();

    updateStats(allOrders);
    ordersTableBody.innerHTML = '';

    if (!filtered.length) {
      ordersTableBody.innerHTML = '<tr><td colspan="6">No matching orders found.</td></tr>';
      renderDetails(null);
      return;
    }

    let displaySelectedOrder = null;

    if (selectedOrderId) {
      displaySelectedOrder = filtered.find(order => getRowId(order) === selectedOrderId) || null;
    }

    if (!displaySelectedOrder) {
      displaySelectedOrder = filtered[0];
      setSelectedOrder(displaySelectedOrder);
    }

    filtered.forEach(order => {
      const rowNumber = getField(order, ['RowNumber']);
      const rowId = getRowId(order);
      const fullName = getField(order, ['FullName', 'fullName', 'Name', 'name']);
      const email = getField(order, ['Email', 'email']);
      const planName = getField(order, ['PlanName', 'planName', 'Service', 'service']);
      const amount = getField(order, ['Amount', 'amount']);
      const status = getField(order, ['Status', 'status']);
      const isSelected = selectedOrderId && rowId === selectedOrderId;

      const row = document.createElement('tr');
      row.className = 'clickable' + (isSelected ? ' selected-row' : '');
      row.dataset.rowNumber = rowNumber;
      row.dataset.rowId = rowId;

      row.innerHTML = `
        <td>${escapeHtml(fullName)}</td>
        <td>${escapeHtml(email)}</td>
        <td>${escapeHtml(planName)}</td>
        <td>$${escapeHtml(amount)}</td>
        <td>${escapeHtml(status)}</td>
        <td class="status-actions-cell">
          <div class="status-cell">
            <select class="row-status-select" data-row-number="${escapeHtml(rowNumber)}">
              <option value="New Lead" ${status === 'New Lead' ? 'selected' : ''}>New Lead</option>
              <option value="Paid - Awaiting Fulfillment" ${status === 'Paid - Awaiting Fulfillment' ? 'selected' : ''}>Paid - Awaiting Fulfillment</option>
              <option value="In Progress" ${status === 'In Progress' ? 'selected' : ''}>In Progress</option>
              <option value="Completed" ${status === 'Completed' ? 'selected' : ''}>Completed</option>
              <option value="Follow Up" ${status === 'Follow Up' ? 'selected' : ''}>Follow Up</option>
            </select>
            <button type="button" class="row-status-save-btn" data-row-number="${escapeHtml(rowNumber)}">Save</button>
          </div>
        </td>
      `;

      ordersTableBody.appendChild(row);
    });

    renderDetails(displaySelectedOrder);
  }

  async function loadOrders(silent = false, preferredSelectedId = null) {
    const url = getEffectiveApiUrl();

    if (!url) {
      showMessage('Enter or paste your API URL first.', 'error');
      return;
    }

    if (preferredSelectedId) {
      selectedOrderId = preferredSelectedId;
    }

    setLoadingState(true);

    try {
      const res = await fetch(url);
      const data = await res.json();

      if (!Array.isArray(data)) {
        showMessage('Unexpected response format. Expected a list of orders.', 'error');
        return;
      }

      allOrders = data;

      if (selectedOrderId) {
        const stillExists = allOrders.find(order => getRowId(order) === selectedOrderId);
        if (!stillExists) {
          selectedOrderId = null;
        }
      }

      renderOrders();

      if (!silent) {
        showMessage('Orders loaded successfully.', 'success');
      }
    } catch (err) {
      console.error(err);
      showMessage('Error loading orders. Check the API URL and Apps Script response.', 'error');
    } finally {
      setLoadingState(false);
    }
  }

  document.getElementById('saveUrlBtn').addEventListener('click', saveUrl);
  document.getElementById('loadOrdersBtn').addEventListener('click', () => loadOrders());

  searchInput.addEventListener('input', renderOrders);

  statusFilter.addEventListener('change', () => {
    syncQuickFiltersFromDropdown();
    renderOrders();
  });

  quickFilters.addEventListener('click', (e) => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    statusFilter.value = btn.dataset.filter || '';
    syncQuickFiltersFromDropdown();
    renderOrders();
  });

  ordersTableBody.addEventListener('click', async (e) => {
    const saveBtn = e.target.closest('.row-status-save-btn');
    const selectEl = e.target.closest('.row-status-select');
    const statusCell = e.target.closest('.status-actions-cell');
    const row = e.target.closest('tr.clickable');

    if (saveBtn) {
      e.stopPropagation();

      const rowNumber = saveBtn.dataset.rowNumber;
      const parentRow = saveBtn.closest('tr.clickable');
      const statusSelect = parentRow ? parentRow.querySelector('.row-status-select') : null;

      if (!statusSelect) {
        showMessage('Status selector not found.', 'error');
        return;
      }

      if (parentRow) {
        const clickedOrder = allOrders.find(order => getRowId(order) === parentRow.dataset.rowId);
        if (clickedOrder) {
          setSelectedOrder(clickedOrder);
          renderOrders();
        }
      }

      await updateStatus(rowNumber, statusSelect.value, saveBtn);
      return;
    }

    if (selectEl || statusCell) {
      e.stopPropagation();
      return;
    }

    if (row) {
      const clickedOrder = allOrders.find(order => getRowId(order) === row.dataset.rowId);
      if (clickedOrder) {
        setSelectedOrder(clickedOrder);
        renderOrders();
      }
    }
  });

  window.onload = () => {
    const saved = localStorage.getItem('apiUrl');
    if (saved) {
      apiUrlInput.value = saved;
    }
    syncQuickFiltersFromDropdown();
  };
</script>

</body>
</html>
