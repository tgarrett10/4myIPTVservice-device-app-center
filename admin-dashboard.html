<!DOCTYPE html>
<html>
<head>
  <title>Admin Order Dashboard</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    h1, h2 {
      margin-bottom: 10px;
    }
    input {
      padding: 10px;
      width: 420px;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 14px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      border: 1px solid #334155;
      font-size: 14px;
      vertical-align: top;
    }
    th {
      background: #1e293b;
    }
    pre {
      background: #020617;
      border: 1px solid #334155;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 8px;
    }
    .section {
      margin-top: 24px;
    }
  </style>
</head>
<body>

<h1>Order Dashboard</h1>

<input id="apiUrl" placeholder="Paste your Apps Script URL here" />
<button onclick="saveUrl()">Save URL</button>
<button onclick="loadOrders()">Load Orders</button>

<div class="section">
  <h2>Orders</h2>
  <table id="ordersTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Service</th>
        <th>Amount</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="5">No data loaded yet.</td></tr>
    </tbody>
  </table>
</div>

<div class="section">
  <h2>Debug Preview</h2>
  <pre id="debugBox">No data loaded yet.</pre>
</div>

<script>
  function saveUrl() {
    const url = document.getElementById('apiUrl').value.trim();
    localStorage.setItem('apiUrl', url);
    alert('Saved');
  }

  function getField(order, possibleNames) {
    for (const name of possibleNames) {
      if (order[name] !== undefined && order[name] !== null && order[name] !== '') {
        return order[name];
      }
    }
    return '';
  }

  function loadOrders() {
    const url = localStorage.getItem('apiUrl');

    if (!url) {
      alert('Enter your API URL first');
      return;
    }

    fetch(url)
      .then(res => res.json())
      .then(data => {
        const table = document.querySelector('#ordersTable tbody');
        const debugBox = document.getElementById('debugBox');

        debugBox.textContent = JSON.stringify(data, null, 2);
        table.innerHTML = '';

        if (!Array.isArray(data) || data.length === 0) {
          table.innerHTML = '<tr><td colspan="5">No orders found.</td></tr>';
          return;
        }

        data.slice().reverse().forEach(order => {
          const fullName = getField(order, ['FullName', 'fullName', 'Name', 'name']);
          const email = getField(order, ['Email', 'email']);
          const planName = getField(order, ['PlanName', 'planName', 'Service', 'service']);
          const amount = getField(order, ['Amount', 'amount']);
          const status = getField(order, ['Status', 'status']);

          const row = `
            <tr>
              <td>${fullName}</td>
              <td>${email}</td>
              <td>${planName}</td>
              <td>$${amount}</td>
              <td>${status}</td>
            </tr>
          `;
          table.innerHTML += row;
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById('debugBox').textContent = 'Error: ' + err;
        alert('Error loading orders');
      });
  }

  window.onload = () => {
    const saved = localStorage.getItem('apiUrl');
    if (saved) {
      document.getElementById('apiUrl').value = saved;
    }
  };
</script>

</body>
</html>
