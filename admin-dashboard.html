<!DOCTYPE html>
<html>
<head>
  <title>Admin Order Dashboard</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
      margin: 0;
    }

    h1, h2, h3 {
      margin-bottom: 10px;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
      align-items: center;
    }

    input, select, button, textarea {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #334155;
      font-size: 14px;
      font-family: Arial, Helvetica, sans-serif;
    }

    input, textarea {
      background: white;
      color: black;
    }

    select {
      background: white;
      color: black;
    }

    button {
      cursor: pointer;
      background: #1e293b;
      color: white;
    }

    button:hover {
      opacity: 0.92;
    }

    .primary-btn {
      background: #2563eb;
    }

    .success-btn {
      background: #166534;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 20px 0;
    }

    .stat-card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px;
    }

    .stat-label {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
    }

    .message {
      margin-top: 10px;
      font-weight: bold;
      min-height: 22px;
    }

    .success {
      color: #86efac;
    }

    .error {
      color: #fca5a5;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      align-items: start;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: #111827;
    }

    th, td {
      padding: 10px;
      border: 1px solid #334155;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #1e293b;
      text-align: left;
    }

    tr.clickable {
      cursor: pointer;
    }

    tr.clickable:hover {
      background: #172033;
    }

    tr.selected-row {
      background: #1e3a5f;
    }

    .details-panel {
      margin-top: 20px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px;
      position: sticky;
      top: 20px;
    }

    .detail-row {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #334155;
    }

    .detail-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .detail-label {
      color: #94a3b8;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 14px;
      word-break: break-word;
      line-height: 1.45;
    }

    .detail-input,
    .detail-select,
    .detail-textarea {
      width: 100%;
      margin-top: 6px;
    }

    .detail-textarea {
      min-height: 90px;
      resize: vertical;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .empty-note {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid #334155;
      background: #111827;
      color: white;
      cursor: pointer;
    }

    .pill.active {
      background: #2563eb;
      border-color: #3b82f6;
    }

    .muted {
      color: #94a3b8;
      font-size: 13px;
    }

    .status-cell {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .status-cell select {
      min-width: 160px;
    }

    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .details-panel {
        position: static;
      }
    }

    @media (max-width: 600px) {
      .stats {
        grid-template-columns: 1fr;
      }
      input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<h1>Order Dashboard</h1>

<div class="top-bar">
  <input id="apiUrl" placeholder="Paste your Apps Script URL here" />
  <button type="button" onclick="saveUrl()">Save URL</button>
  <button type="button" class="primary-btn" onclick="loadOrders()">Load Orders</button>
</div>

<div class="top-bar">
  <input id="searchInput" placeholder="Search name, email, or service" oninput="renderOrders()" />
  <select id="statusFilter" onchange="syncQuickFiltersFromDropdown(); renderOrders();">
    <option value="">All Statuses</option>
    <option value="New Lead">New Lead</option>
    <option value="Paid - Awaiting Fulfillment">Paid - Awaiting Fulfillment</option>
    <option value="In Progress">In Progress</option>
    <option value="Completed">Completed</option>
    <option value="Follow Up">Follow Up</option>
  </select>
</div>

<div class="pill-row" id="quickFilters">
  <button type="button" class="pill active" onclick="setQuickFilter('')">All</button>
  <button type="button" class="pill" onclick="setQuickFilter('New Lead')">New Lead</button>
  <button type="button" class="pill" onclick="setQuickFilter('Paid - Awaiting Fulfillment')">Paid</button>
  <button type="button" class="pill" onclick="setQuickFilter('In Progress')">In Progress</button>
  <button type="button" class="pill" onclick="setQuickFilter('Completed')">Completed</button>
  <button type="button" class="pill" onclick="setQuickFilter('Follow Up')">Follow Up</button>
</div>

<div id="message" class="message"></div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total Orders</div>
    <div class="stat-value" id="statTotal">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Paid</div>
    <div class="stat-value" id="statPaid">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">In Progress</div>
    <div class="stat-value" id="statInProgress">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Completed</div>
    <div class="stat-value" id="statCompleted">0</div>
  </div>
</div>

<div class="layout">
  <div>
    <table id="ordersTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Service</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Update Status</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="6">No data loaded yet.</td></tr>
      </tbody>
    </table>
  </div>

  <div class="details-panel">
    <h3>Order Details</h3>
    <div id="detailsContent" class="empty-note">Click an order row to view details.</div>
  </div>
</div>

<script>
  let allOrders = [];
  let selectedOrder = null;

  function showMessage(text, type) {
    const message = document.getElementById('message');
    message.className = 'message ' + type;
    message.textContent = text;
  }

  function saveUrl() {
    const url = document.getElementById('apiUrl').value.trim();
    localStorage.setItem('apiUrl', url);
    showMessage('API URL saved.', 'success');
  }

  function getField(order, possibleNames) {
    for (const name of possibleNames) {
      if (order[name] !== undefined && order[name] !== null && order[name] !== '') {
        return order[name];
      }
    }
    return '';
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function updateStats(orders) {
    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statPaid').textContent = orders.filter(o =>
      String(getField(o, ['Status', 'status'])).includes('Paid')
    ).length;
    document.getElementById('statInProgress').textContent = orders.filter(o =>
      String(getField(o, ['Status', 'status'])) === 'In Progress'
    ).length;
    document.getElementById('statCompleted').textContent = orders.filter(o =>
      String(getField(o, ['Status', 'status'])) === 'Completed'
    ).length;
  }

  function setQuickFilter(statusValue) {
    document.getElementById('statusFilter').value = statusValue;
    syncQuickFiltersFromDropdown();
    renderOrders();
  }

  function syncQuickFiltersFromDropdown() {
    const current = document.getElementById('statusFilter').value;
    const buttons = Array.from(document.querySelectorAll('#quickFilters .pill'));

    buttons.forEach(btn => btn.classList.remove('active'));

    const matchingButton = buttons.find(btn => {
      const label = btn.textContent.trim();
      if (current === '' && label === 'All') return true;
      if (current === 'New Lead' && label === 'New Lead') return true;
      if (current === 'Paid - Awaiting Fulfillment' && label === 'Paid') return true;
      if (current === 'In Progress' && label === 'In Progress') return true;
      if (current === 'Completed' && label === 'Completed') return true;
      if (current === 'Follow Up' && label === 'Follow Up') return true;
      return false;
    });

    if (matchingButton) {
      matchingButton.classList.add('active');
    }
  }

  async function updateStatus(rowNumber, newStatus) {
    const url = localStorage.getItem('apiUrl');

    if (!url) {
      showMessage('API URL is missing.', 'error');
      return;
    }

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action: 'updateStatus',
          rowNumber: rowNumber,
          status: newStatus
        })
      });

      const result = await response.json();

      if (result.success) {
        showMessage('Status updated successfully.', 'success');
        await loadOrders(true);
      } else {
        showMessage('Status update failed: ' + (result.error || 'Unknown error'), 'error');
      }
    } catch (error) {
      console.error(error);
      showMessage('Error updating status: ' + error.message, 'error');
    }
  }

  async function handleStatusSaveClick(evt, rowNumber, selectId) {
    evt.stopPropagation();
    const select = document.getElementById(selectId);
    if (!select) {
      showMessage('Status selector not found.', 'error');
      return;
    }
    await updateStatus(rowNumber, select.value);
  }

  async function updateOrderFields() {
    if (!selectedOrder) {
      showMessage('Select an order first.', 'error');
      return;
    }

    const url = localStorage.getItem('apiUrl');

    if (!url) {
      showMessage('API URL is missing.', 'error');
      return;
    }

    const rowNumber = getField(selectedOrder, ['RowNumber']);
    const orderShipped = document.getElementById('detailOrderShipped').value;
    const trackingNumber = document.getElementById('detailTrackingNumber').value.trim();
    const notes = document.getElementById('detailNotes').value.trim();

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action: 'updateOrderFields',
          rowNumber: rowNumber,
          orderShipped: orderShipped,
          trackingNumber: trackingNumber,
          notes: notes
        })
      });

      const result = await response.json();

      if (result.success) {
        showMessage('Order details updated successfully.', 'success');
        await loadOrders(true);
      } else {
        showMessage('Order detail update failed: ' + (result.error || 'Unknown error'), 'error');
      }
    } catch (error) {
      console.error(error);
      showMessage('Error updating order details: ' + error.message, 'error');
    }
  }

  function buildStatusDropdown(currentStatus, rowNumber) {
    const options = [
      'New Lead',
      'Paid - Awaiting Fulfillment',
      'In Progress',
      'Completed',
      'Follow Up'
    ];

    const selectId = 'status_' + rowNumber;

    const optionsHtml = options.map(status => {
      const selected = status === currentStatus ? 'selected' : '';
      return `<option value="${escapeHtml(status)}" ${selected}>${escapeHtml(status)}</option>`;
    }).join('');

    return `
      <div class="status-cell">
        <select id="${selectId}">
          ${optionsHtml}
        </select>
        <button type="button" onclick="handleStatusSaveClick(event, ${rowNumber}, '${selectId}')">Save</button>
      </div>
    `;
  }

  function renderDetails(order) {
    const details = document.getElementById('detailsContent');

    if (!order) {
      details.innerHTML = 'Click an order row to view details.';
      return;
    }

    const fullName = getField(order, ['FullName', 'fullName', 'Name', 'name']);
    const email = getField(order, ['Email', 'email']);
    const phone = getField(order, ['Phone', 'phone']);
    const address = getField(order, ['Address', 'address']);
    const service = getField(order, ['PlanName', 'planName', 'Service', 'service']);
    const amount = getField(order, ['Amount', 'amount']);
    const status = getField(order, ['Status', 'status']);
    const orderShipped = getField(order, ['OrderShipped', 'orderShipped']);
    const trackingNumber = getField(order, ['TrackingNumber', 'trackingNumber']);
    const deviceType = getField(order, ['DeviceType', 'deviceType']);
    const deviceNickname = getField(order, ['DeviceNickname', 'deviceNickname']);
    const notes = getField(order, ['Notes', 'notes']);
    const paymentType = getField(order, ['PaymentType', 'paymentType']);
    const paypalId = getField(order, ['PayPalSubscriptionId', 'paypalSubscriptionId']);
    const timestamp = getField(order, ['Timestamp', 'timestamp']);

    details.innerHTML = `
      <div class="detail-row">
        <div class="detail-label">Full Name</div>
        <div class="detail-value">${escapeHtml(fullName)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Email</div>
        <div class="detail-value">${escapeHtml(email)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Phone</div>
        <div class="detail-value">${escapeHtml(phone)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Address</div>
        <div class="detail-value">${escapeHtml(address)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Service</div>
        <div class="detail-value">${escapeHtml(service)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Amount</div>
        <div class="detail-value">$${escapeHtml(amount)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Status</div>
        <div class="detail-value">${escapeHtml(status)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Order Shipped</div>
        <select id="detailOrderShipped" class="detail-select">
          <option value="" ${orderShipped === '' ? 'selected' : ''}>Blank</option>
          <option value="No" ${String(orderShipped) === 'No' ? 'selected' : ''}>No</option>
          <option value="Yes" ${String(orderShipped) === 'Yes' ? 'selected' : ''}>Yes</option>
          <option value="Not Shipped" ${String(orderShipped) === 'Not Shipped' ? 'selected' : ''}>Not Shipped</option>
        </select>
      </div>
      <div class="detail-row">
        <div class="detail-label">Tracking Number</div>
        <input id="detailTrackingNumber" class="detail-input" value="${escapeHtml(trackingNumber)}" placeholder="Enter tracking number" />
      </div>
      <div class="detail-row">
        <div class="detail-label">Device Type</div>
        <div class="detail-value">${escapeHtml(deviceType)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Device Nickname</div>
        <div class="detail-value">${escapeHtml(deviceNickname)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Notes</div>
        <textarea id="detailNotes" class="detail-textarea" placeholder="Add internal notes here">${escapeHtml(notes)}</textarea>
      </div>
      <div class="detail-row">
        <div class="detail-label">Payment Type</div>
        <div class="detail-value">${escapeHtml(paymentType)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">PayPal ID</div>
        <div class="detail-value">${escapeHtml(paypalId)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Timestamp</div>
        <div class="detail-value">${escapeHtml(timestamp)}</div>
      </div>
      <div class="detail-actions">
        <button type="button" class="success-btn" onclick="updateOrderFields()">Save Shipping / Tracking / Notes</button>
      </div>
    `;
  }

  function renderOrders() {
    const table = document.querySelector('#ordersTable tbody');
    const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
    const statusFilter = document.getElementById('statusFilter').value;

    let filtered = allOrders.slice().reverse();

    if (searchText) {
      filtered = filtered.filter(order => {
        const fullName = String(getField(order, ['FullName', 'fullName', 'Name', 'name'])).toLowerCase();
        const email = String(getField(order, ['Email', 'email'])).toLowerCase();
        const planName = String(getField(order, ['PlanName', 'planName', 'Service', 'service'])).toLowerCase();
        return fullName.includes(searchText) || email.includes(searchText) || planName.includes(searchText);
      });
    }

    if (statusFilter) {
      filtered = filtered.filter(order => {
        const status = String(getField(order, ['Status', 'status']));
        return status === statusFilter;
      });
    }

    updateStats(allOrders);
    table.innerHTML = '';

    if (!filtered.length) {
      table.innerHTML = '<tr><td colspan="6">No matching orders found.</td></tr>';
      renderDetails(null);
      return;
    }

    filtered.forEach(order => {
      const rowNumber = getField(order, ['RowNumber']);
      const fullName = getField(order, ['FullName', 'fullName', 'Name', 'name']);
      const email = getField(order, ['Email', 'email']);
      const planName = getField(order, ['PlanName', 'planName', 'Service', 'service']);
      const amount = getField(order, ['Amount', 'amount']);
      const status = getField(order, ['Status', 'status']);

      const isSelected = selectedOrder && String(getField(selectedOrder, ['RowNumber'])) === String(rowNumber);

      const row = document.createElement('tr');
      row.className = 'clickable' + (isSelected ? ' selected-row' : '');
      row.innerHTML = `
        <td>${escapeHtml(fullName)}</td>
        <td>${escapeHtml(email)}</td>
        <td>${escapeHtml(planName)}</td>
        <td>$${escapeHtml(amount)}</td>
        <td>${escapeHtml(status)}</td>
        <td>${buildStatusDropdown(status, rowNumber)}</td>
      `;

      row.addEventListener('click', () => {
        selectedOrder = order;
        renderOrders();
        renderDetails(order);
      });

      table.appendChild(row);
    });

    if (selectedOrder) {
      const updatedSelected = allOrders.find(order =>
        String(getField(order, ['RowNumber'])) === String(getField(selectedOrder, ['RowNumber']))
      );
      if (updatedSelected) {
        selectedOrder = updatedSelected;
        renderDetails(updatedSelected);
      } else {
        selectedOrder = filtered[0];
        renderDetails(filtered[0]);
      }
    } else {
      selectedOrder = filtered[0];
      renderDetails(filtered[0]);
    }
  }

  async function loadOrders(silent = false) {
    const url = localStorage.getItem('apiUrl');

    if (!url) {
      showMessage('Enter your API URL first.', 'error');
      return;
    }

    try {
      const res = await fetch(url);
      const data = await res.json();

      if (!Array.isArray(data)) {
        showMessage('Unexpected response format.', 'error');
        return;
      }

      allOrders = data;
      renderOrders();

      if (!silent) {
        showMessage('Orders loaded successfully.', 'success');
      }
    } catch (err) {
      console.error(err);
      showMessage('Error loading orders.', 'error');
    }
  }

  window.onload = () => {
    const saved = localStorage.getItem('apiUrl');
    if (saved) {
      document.getElementById('apiUrl').value = saved;
    }
    syncQuickFiltersFromDropdown();
  };
</script>

</body>
</html>
