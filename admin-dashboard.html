<!DOCTYPE html>
<html>
<head>
  <title>Admin Order Dashboard</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
      align-items: center;
    }
    input, select, button {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #334155;
      font-size: 14px;
    }
    input {
      width: 300px;
      background: white;
      color: black;
    }
    select {
      background: white;
      color: black;
    }
    button {
      cursor: pointer;
      background: #1e293b;
      color: white;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 20px 0;
    }
    .stat-card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px;
    }
    .stat-label {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: bold;
    }
    .message {
      margin-top: 10px;
      font-weight: bold;
    }
    .success {
      color: #86efac;
    }
    .error {
      color: #fca5a5;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      border: 1px solid #334155;
      font-size: 14px;
      vertical-align: top;
    }
    th {
      background: #1e293b;
    }
    @media (max-width: 900px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 600px) {
      .stats {
        grid-template-columns: 1fr;
      }
      input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<h1>Order Dashboard</h1>

<div class="top-bar">
  <input id="apiUrl" placeholder="Paste your Apps Script URL here" />
  <button onclick="saveUrl()">Save URL</button>
  <button onclick="loadOrders()">Load Orders</button>
</div>

<div class="top-bar">
  <input id="searchInput" placeholder="Search name, email, or service" oninput="renderOrders()" />
  <select id="statusFilter" onchange="renderOrders()">
    <option value="">All Statuses</option>
    <option value="New Lead">New Lead</option>
    <option value="Paid - Awaiting Fulfillment">Paid - Awaiting Fulfillment</option>
    <option value="In Progress">In Progress</option>
    <option value="Completed">Completed</option>
    <option value="Follow Up">Follow Up</option>
  </select>
</div>

<div id="message" class="message"></div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total Orders</div>
    <div class="stat-value" id="statTotal">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Paid</div>
    <div class="stat-value" id="statPaid">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">In Progress</div>
    <div class="stat-value" id="statInProgress">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Completed</div>
    <div class="stat-value" id="statCompleted">0</div>
  </div>
</div>

<table id="ordersTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Service</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Update Status</th>
    </tr>
  </thead>
  <tbody>
    <tr><td colspan="6">No data loaded yet.</td></tr>
  </tbody>
</table>

<script>
  let allOrders = [];

  function showMessage(text, type) {
    const message = document.getElementById('message');
    message.className = 'message ' + type;
    message.textContent = text;
  }

  function saveUrl() {
    const url = document.getElementById('apiUrl').value.trim();
    localStorage.setItem('apiUrl', url);
    alert('Saved');
  }

  function getField(order, possibleNames) {
    for (const name of possibleNames) {
      if (order[name] !== undefined && order[name] !== null && order[name] !== '') {
        return order[name];
      }
    }
    return '';
  }

  function updateStats(orders) {
    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statPaid').textContent = orders.filter(o =>
      String(getField(o, ['Status', 'status'])).includes('Paid')
    ).length;
    document.getElementById('statInProgress').textContent = orders.filter(o =>
      String(getField(o, ['Status', 'status'])) === 'In Progress'
    ).length;
    document.getElementById('statCompleted').textContent = orders.filter(o =>
      String(getField(o, ['Status', 'status'])) === 'Completed'
    ).length;
  }

  async function updateStatus(rowNumber, newStatus) {
    const url = localStorage.getItem('apiUrl');

    if (!url) {
      showMessage('API URL is missing.', 'error');
      return;
    }

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action: 'updateStatus',
          rowNumber: rowNumber,
          status: newStatus
        })
      });

      const result = await response.json();

      if (result.success) {
        showMessage('Status updated successfully.', 'success');
        loadOrders();
      } else {
        showMessage('Status update failed: ' + (result.error || 'Unknown error'), 'error');
      }
    } catch (error) {
      console.error(error);
      showMessage('Error updating status: ' + error.message, 'error');
    }
  }

  function buildStatusDropdown(currentStatus, rowNumber) {
    const options = [
      'New Lead',
      'Paid - Awaiting Fulfillment',
      'In Progress',
      'Completed',
      'Follow Up'
    ];

    const selectId = 'status_' + rowNumber;

    const optionsHtml = options.map(status => {
      const selected = status === currentStatus ? 'selected' : '';
      return `<option value="${status}" ${selected}>${status}</option>`;
    }).join('');

    return `
      <select id="${selectId}">
        ${optionsHtml}
      </select>
      <button onclick="updateStatus(${rowNumber}, document.getElementById('${selectId}').value)">Save</button>
    `;
  }

  function renderOrders() {
    const table = document.querySelector('#ordersTable tbody');
    const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
    const statusFilter = document.getElementById('statusFilter').value;

    let filtered = allOrders.slice().reverse();

    if (searchText) {
      filtered = filtered.filter(order => {
        const fullName = String(getField(order, ['FullName', 'fullName', 'Name', 'name'])).toLowerCase();
        const email = String(getField(order, ['Email', 'email'])).toLowerCase();
        const planName = String(getField(order, ['PlanName', 'planName', 'Service', 'service'])).toLowerCase();
        return fullName.includes(searchText) || email.includes(searchText) || planName.includes(searchText);
      });
    }

    if (statusFilter) {
      filtered = filtered.filter(order => {
        const status = String(getField(order, ['Status', 'status']));
        return status === statusFilter;
      });
    }

    updateStats(allOrders);
    table.innerHTML = '';

    if (!filtered.length) {
      table.innerHTML = '<tr><td colspan="6">No matching orders found.</td></tr>';
      return;
    }

    filtered.forEach(order => {
      const rowNumber = getField(order, ['RowNumber']);
      const fullName = getField(order, ['FullName', 'fullName', 'Name', 'name']);
      const email = getField(order, ['Email', 'email']);
      const planName = getField(order, ['PlanName', 'planName', 'Service', 'service']);
      const amount = getField(order, ['Amount', 'amount']);
      const status = getField(order, ['Status', 'status']);

      const row = `
        <tr>
          <td>${fullName}</td>
          <td>${email}</td>
          <td>${planName}</td>
          <td>$${amount}</td>
          <td>${status}</td>
          <td>${buildStatusDropdown(status, rowNumber)}</td>
        </tr>
      `;
      table.innerHTML += row;
    });
  }

  function loadOrders() {
    const url = localStorage.getItem('apiUrl');

    if (!url) {
      alert('Enter your API URL first');
      return;
    }

    fetch(url)
      .then(res => res.json())
      .then(data => {
        if (!Array.isArray(data)) {
          showMessage('Unexpected response format.', 'error');
          return;
        }

        allOrders = data;
        renderOrders();
        showMessage('Orders loaded successfully.', 'success');
      })
      .catch(err => {
        console.error(err);
        showMessage('Error loading orders.', 'error');
      });
  }

  window.onload = () => {
    const saved = localStorage.getItem('apiUrl');
    if (saved) {
      document.getElementById('apiUrl').value = saved;
    }
  };
</script>

</body>
</html>
